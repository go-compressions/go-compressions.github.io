# ---------- Paths (moving spheres) ----------
#
# Two parallel flows : codec lane (top) + hash lane (bottom).
# Staggered so the eye sees both pipelines running concurrently.

# Codec lane.
[[paths]]
d = "M 170 280 L 470 170 L 720 170 L 1040 150"
dur = "5s"
r = 5
fill = "var(--accent)"
[[paths]]
d = "M 170 280 L 470 170 L 720 170 L 1040 150"
dur = "5s"
begin = "1.5s"
r = 5
fill = "var(--accent-2)"

# Hash lane.
[[paths]]
d = "M 170 280 L 470 400 L 720 400 L 1040 410"
dur = "5.5s"
begin = "0.8s"
r = 5
fill = "var(--accent-3)"
[[paths]]
