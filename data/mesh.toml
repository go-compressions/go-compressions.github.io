# go-compressions pipeline visualisation — read by layouts/partials/mesh.html.
#
# Three columns :
#   Left   : input — a byte stream.
#   Centre : two parallel transforms — compress (LZFSE) + hash (BLAKE3).
#   Right  : output — compressed body OR fixed-size digest.
#
# Spheres flow input → transform → output, encoding "byte streams
# in, byte streams out". Two lanes : one for codecs, one for hashes.

# ---------- Containers (back layer rectangles) ----------

# Left column : input.
[[containers]]
kind  = "rack"
x     = 60
y     = 180
w     = 220
h     = 200
label = "Byte stream in"
lx    = 100
ly    = 170

# Centre column : transforms.
[[containers]]
kind  = "dc"
x     = 360
y     = 80
w     = 480
h     = 420
label = "PURE-GO TRANSFORMS"
lx    = 460
ly    = 70

# Right column : output.
[[containers]]
kind  = "rack"
x     = 920
y     = 100
w     = 240
h     = 100
label = "Compressed body"
lx    = 960
ly    = 90
[[containers]]
kind  = "rack"
x     = 920
y     = 360
w     = 240
h     = 100
label = "Fixed-size digest"
lx    = 960
ly    = 350

