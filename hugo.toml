baseURL = "https://go-compressions.github.io/"
title = "go-compressions"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

# Each repo card. "result" is the honest headline (wins AND parities/limits).
# "kind" tags whether it is a compression codec or a content-addressable hash.
[[params.repos]]
  name = "lz4"
  accel = "LZ4 block codec (CompressBlock / DecompressBlock)"
  kind = "codec"
  result = "wire-compatible with pierrec/lz4 — beats it on compression ratio (text ~4.6% smaller); honestly slower on speed. Match extension delegates to matchlen's SIMD common-prefix kernel."
[[params.repos]]
  name = "lzfse"
  accel = "Apple LZFSE / LZVN codec (Compress / Decompress)"
  kind = "codec"
  result = "byte-compatible with the reference liblzfse: LZFSE = LZVN + FSE entropy stage. Auto-picks LZVN for ≤4 KiB inputs, LZFSE V1/V2 for larger; round-trips against Apple's C reference."
[[params.repos]]
  name = "lzfsec"
  accel = "lzfsec CLI (compress / decompress)"
  kind = "codec"
  result = "single static-binary CLI over lzfse — stdin/stdout by default, optional -v summary (ratio + timing). Pure Go, no C toolchain."
[[params.repos]]
  name = "blake3"
  accel = "BLAKE3 cryptographic hash (Sum256 / Sum512 / XOF)"
  kind = "hash"
  result = "pure-Go, cgo-free BLAKE3, verified against the official test vectors. Streaming hash.Hash-style API plus arbitrary-length extendable output. Default unkeyed mode (keyed / KDF not implemented)."
[[params.repos]]
  name = "b3sum"
  accel = "b3sum CLI (print / verify BLAKE3 checksums)"
  kind = "hash"
  result = "pure-Go, cgo-free b3sum — output compatible with the reference Rust b3sum (<hex>  <name>). Hashes files/stdin, --check verification, --length / --no-names. Single static binary."
